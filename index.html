<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeLog — Journal Less. Learn More.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Space Grotesk', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
            mono: ['IBM Plex Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #0d1117; color: #e2e8f0; font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #334155; }
    .toast { animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    .nav-item { transition: all 0.15s ease; }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { border-color: #334155 !important; }
    .row-hover:hover { background: #1c2230 !important; }
    input, select, textarea { outline: none; font-family: inherit; }
    input:focus, select:focus, textarea:focus { box-shadow: 0 0 0 2px #3b82f640; }
    .pnl-positive { color: #22c55e; }
    .pnl-negative { color: #ef4444; }
    .badge-long { background: #052e16; color: #22c55e; border: 1px solid #166534; }
    .badge-short { background: #2a0a0a; color: #ef4444; border: 1px solid #7f1d1d; }
    .emotion-chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; }
    @keyframes countUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .stat-anim { animation: countUp 0.4s ease forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Load order matters: React → Recharts → Lucide → App -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/lucide-react@0.446.0/dist/umd/lucide-react.js"></script>
  <script src="app.js"></script>
</body>
</html>
